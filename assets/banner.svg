<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#0d1117"/>
    <stop offset="50%" style="stop-color:#161b22"/>
    <stop offset="100%" style="stop-color:#0d1117"/>
  </linearGradient>
  <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#7F77DD;stop-opacity:0.6"/>
    <stop offset="100%" style="stop-color:#534AB7;stop-opacity:0.1"/>
  </linearGradient>
  <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#1D9E75;stop-opacity:0.1"/>
    <stop offset="100%" style="stop-color:#5DCAA5;stop-opacity:0.5"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="1280" height="320" fill="url(#bg)"/>

<!-- Subtle grid pattern -->
<g opacity="0.06" stroke="#7F77DD" stroke-width="0.5">
  <line x1="0" y1="80" x2="1280" y2="80"/>
  <line x1="0" y1="160" x2="1280" y2="160"/>
  <line x1="0" y1="240" x2="1280" y2="240"/>
  <line x1="320" y1="0" x2="320" y2="320"/>
  <line x1="640" y1="0" x2="640" y2="320"/>
  <line x1="960" y1="0" x2="960" y2="320"/>
</g>

<!-- Left decorative: skill crystallization visualization -->
<g transform="translate(60,40)" opacity="0.5">
  <!-- Pattern traces (raw data) -->
  <circle cx="30" cy="60" r="3" fill="#5DCAA5" opacity="0.4"/>
  <circle cx="55" cy="45" r="3" fill="#5DCAA5" opacity="0.5"/>
  <circle cx="20" cy="90" r="3" fill="#5DCAA5" opacity="0.3"/>
  <circle cx="70" cy="75" r="3" fill="#5DCAA5" opacity="0.6"/>
  <circle cx="45" cy="110" r="3" fill="#5DCAA5" opacity="0.4"/>
  <circle cx="85" cy="55" r="3" fill="#5DCAA5" opacity="0.5"/>
  <circle cx="60" cy="130" r="3" fill="#5DCAA5" opacity="0.3"/>
  
  <!-- Convergence lines -->
  <line x1="30" y1="60" x2="120" y2="140" stroke="#5DCAA5" stroke-width="0.8" opacity="0.3"/>
  <line x1="55" y1="45" x2="120" y2="140" stroke="#5DCAA5" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="75" x2="120" y2="140" stroke="#5DCAA5" stroke-width="0.8" opacity="0.3"/>
  <line x1="85" y1="55" x2="120" y2="140" stroke="#5DCAA5" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Crystallized skill (diamond) -->
  <polygon points="120,120 140,140 120,160 100,140" fill="none" stroke="#7F77DD" stroke-width="1.5" opacity="0.8"/>
  <polygon points="120,128 132,140 120,152 108,140" fill="#7F77DD" opacity="0.15"/>
  
  <!-- Output arrow -->
  <line x1="145" y1="140" x2="190" y2="140" stroke="#7F77DD" stroke-width="1" opacity="0.4"/>
  <polygon points="185,136 195,140 185,144" fill="#7F77DD" opacity="0.4"/>
  
  <!-- Deployed skill block -->
  <rect x="195" y="125" width="70" height="30" rx="4" fill="#26215C" stroke="#7F77DD" stroke-width="0.8" opacity="0.6"/>
  <text x="230" y="144" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#CECBF6" opacity="0.7">SKILL.md</text>
</g>

<!-- Right decorative: capability tree -->
<g transform="translate(960,40)" opacity="0.45">
  <!-- Tree root -->
  <rect x="70" y="20" width="60" height="22" rx="4" fill="#26215C" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="100" y="35" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#AFA9EC">agent</text>
  
  <!-- Branches -->
  <line x1="85" y1="42" x2="40" y2="70" stroke="#7F77DD" stroke-width="0.6" opacity="0.5"/>
  <line x1="100" y1="42" x2="100" y2="70" stroke="#7F77DD" stroke-width="0.6" opacity="0.5"/>
  <line x1="115" y1="42" x2="160" y2="70" stroke="#7F77DD" stroke-width="0.6" opacity="0.5"/>
  
  <!-- Leaf nodes -->
  <rect x="15" y="70" width="50" height="18" rx="3" fill="#04342C" stroke="#5DCAA5" stroke-width="0.6"/>
  <text x="40" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#9FE1CB">ops</text>
  
  <rect x="75" y="70" width="50" height="18" rx="3" fill="#04342C" stroke="#5DCAA5" stroke-width="0.6"/>
  <text x="100" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#9FE1CB">dev</text>
  
  <rect x="135" y="70" width="50" height="18" rx="3" fill="#412402" stroke="#EF9F27" stroke-width="0.6"/>
  <text x="160" y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#FAC775">gaps</text>
  
  <!-- Gap indicator -->
  <circle cx="160" cy="100" r="6" fill="none" stroke="#EF9F27" stroke-width="0.8" opacity="0.6"/>
  <text x="160" y="103" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#EF9F27" opacity="0.8">!</text>
  
  <!-- Sub-nodes -->
  <rect x="10" y="100" width="40" height="14" rx="2" fill="#26215C" stroke="#7F77DD" stroke-width="0.4" opacity="0.5"/>
  <rect x="55" y="100" width="40" height="14" rx="2" fill="#26215C" stroke="#7F77DD" stroke-width="0.4" opacity="0.5"/>
  <line x1="30" y1="88" x2="30" y2="100" stroke="#7F77DD" stroke-width="0.4" opacity="0.4"/>
  <line x1="50" y1="88" x2="75" y2="100" stroke="#7F77DD" stroke-width="0.4" opacity="0.4"/>
  
  <!-- Evolution arrow (looping back) -->
  <path d="M100 88 Q100 120 70 130 Q40 140 30 120" fill="none" stroke="#EF9F27" stroke-width="0.6" stroke-dasharray="3 2" opacity="0.4"/>
</g>

<!-- Accent gradient bars -->
<rect x="0" y="0" width="1280" height="2" fill="url(#accent1)"/>
<rect x="0" y="318" width="1280" height="2" fill="url(#accent2)"/>

<!-- Main title -->
<text x="640" y="120" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="56" font-weight="700" fill="#e6edf3" letter-spacing="-2">AceForge</text>

<!-- Tagline -->
<text x="640" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" font-weight="400" fill="#8b949e" letter-spacing="0.5">Self-evolving skill engine for OpenClaw agents</text>

<!-- Pipeline steps -->
<g transform="translate(310,190)">
  <rect width="660" height="36" rx="18" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="330" y="23" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="400" fill="#8b949e" letter-spacing="1">
    Observe  ·  Detect  ·  Generate  ·  Validate  ·  Deploy  ·  Evolve  ·  Propagate
  </text>
</g>

<!-- Version + meta line -->
<text x="640" y="264" text-anchor="middle" font-family="'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace" font-size="11" fill="#5DCAA5" opacity="0.7" letter-spacing="0.5">v0.7.4  ·  MIT License  ·  TypeScript  ·  Phase 1 + 2 + 3  ·  346 tests  ·  19 adversarial mutations</text>

<!-- Bottom tagline -->
<text x="640" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#484f58" letter-spacing="0.3">Grounded in peer-reviewed research  ·  Nothing deploys without your approval</text>
</svg>
